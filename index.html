<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"></link>
    <script defer src="script.js"></script>
    <title>Etch-a-Sketch | Odin</title>
  </head>

  <body class="dark">
    <header>
      <h1><a href="https://github.com/Chris-Jacob-Dela-Cerna/odin-etch-a-sketch" target="_blank">Etch-a-Sketch</a></h1>
      <ul>
        <li><a href="https://github.com/Chris-Jacob-Dela-Cerna" target="_blank">GitHub</a></li>
        <li><a href="https://www.linkedin.com/in/chris-jacob-dela-cerna-46093b422/" target="_blank">LinkedIn</a></li>
        <li class="theme-switch">
          <img id="theme-icon" src="img/dark_mode_icon.png" width="28px" height="28px" alt="theme-icon">
          <p id="theme-info">Dark</p>
        </li>
      </ul>
    </header>

    <div class="main">
      <div class="canvas-panel">
        <div class="canvas"></div>
      </div>

      <div class="editor-panel">
        <h2>Editor Panel</h2>

        <div class="ribbon">
          <h3>Toolbox</h3>
          <div>Nothing to see here.</div>
        </div>

        <div class="ribbon">
          <h3>Color Palette</h3>
          <div>Nothing to see here.</div>
        </div>

        <div class="ribbon" id="canvas-settings">
          <h3>Canvas Settings</h3>
          <div>
            <div></div>
              <label for="canvas-size">Canvas Size:</label>
              <div>
                <input id="canvas-size" name="canvas-size" type="text" inputmode="numeric" placeholder="1 - 100">
                <p id="current-canvas-size">Current = 16</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p>Copyright © 2026</p>
      <p>Chris Jacob Dela Cerna</p>
    </footer>
  </body>
</html>
