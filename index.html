<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"></link>
    <script defer src="script.js"></script>
    <title>Etch-a-Sketch</title>
  </head>

  <body class="dark">
    <header>
      <h1><a href="https://github.com/Chris-Jacob-Dela-Cerna/odin-etch-a-sketch" target="_blank">Etch-a-Sketch</a></h1>
      <ul>
        <li><a href="https://github.com/Chris-Jacob-Dela-Cerna" target="_blank">GitHub</a></li>
        <li><a href="https://www.linkedin.com/in/chris-jacob-dela-cerna-46093b422/" target="_blank">LinkedIn</a></li>
        <li class="theme-switch">
          <img id="theme-icon" src="img/dark_theme_icon.png" width="28px" height="28px" alt="theme-icon">
          <p id="theme-info">Dark</p>
        </li>
      </ul>
    </header>

    <div class="main">
      <div class="canvas-panel">
        <div id="canvas"></div>
      </div>

      <div class="editor-panel">
        <h2>Editor Panel</h2>

        <div class="ribbon" id="toolbox-settings">
          <h3>Toolbox</h3>
          <div class="container" id="tools">
            <button id="pen">
              <img src="img/pen_icon.png" alt="pencil-icon" width="28px" height="28px">
            </button>

            <button id="eraser">
              <img src="img/eraser_icon.png" alt="pencil-icon" width="28px" height="28px">
            </button>
          </div>
        </div>

        <div class="ribbon" id="color-palette">
          <h3>Color Palette</h3>
          <div class="container">
            <div id="palette"></div>
          </div>
        </div>

        <div class="ribbon" id="canvas-settings">
          <h3>Canvas Settings</h3>
          <div class="container">
            <div>
              <label for="canvas-size">Canvas Size:</label>
              <div>
                <input id="canvas-size" name="canvas-size" type="text" inputmode="numeric" placeholder="1 - 100">
                <p id="current-canvas-size"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p>Copyright © 2026</p>
      <p>Chris Jacob Dela Cerna</p>
    </footer>
  </body>
</html>
